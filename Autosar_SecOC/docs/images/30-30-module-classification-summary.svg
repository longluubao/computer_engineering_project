<svg id="my-svg" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 766.75 450" style="max-width: 766.75px; background-color: white;" role="graphics-document document" aria-roledescription="pie"><style>#my-svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#my-svg .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#my-svg .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#my-svg .error-icon{fill:#552222;}#my-svg .error-text{fill:#552222;stroke:#552222;}#my-svg .edge-thickness-normal{stroke-width:1px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-thickness-invisible{stroke-width:0;fill:none;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#333333;stroke:#333333;}#my-svg .marker.cross{stroke:#333333;}#my-svg svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#my-svg p{margin:0;}#my-svg .pieCircle{stroke:black;stroke-width:2px;opacity:0.7;}#my-svg .pieOuterCircle{stroke:black;stroke-width:2px;fill:none;}#my-svg .pieTitleText{text-anchor:middle;font-size:25px;fill:black;font-family:"trebuchet ms",verdana,arial,sans-serif;}#my-svg .slice{font-family:"trebuchet ms",verdana,arial,sans-serif;fill:#333;font-size:17px;}#my-svg .legend text{fill:black;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:17px;}#my-svg .node .neo-node{stroke:#9370DB;}#my-svg [data-look="neo"].node rect,#my-svg [data-look="neo"].cluster rect,#my-svg [data-look="neo"].node polygon{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg [data-look="neo"].node path{stroke:#9370DB;stroke-width:1px;}#my-svg [data-look="neo"].node .outer-path{filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg [data-look="neo"].node .neo-line path{stroke:#9370DB;filter:none;}#my-svg [data-look="neo"].node circle{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg [data-look="neo"].node circle .state-start{fill:#000000;}#my-svg [data-look="neo"].icon-shape .icon{fill:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg [data-look="neo"].icon-shape .icon-neo path{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g/><g transform="translate(225,225)"><circle cx="0" cy="0" r="186" class="pieOuterCircle"/><path d="M0,-185A185,185,0,1,1,-124.634,136.717L0,0Z" fill="#ECECFF" class="pieCircle"/><path d="M-124.634,136.717A185,185,0,0,1,-184.211,17.07L0,0Z" fill="#ffffde" class="pieCircle"/><path d="M-184.211,17.07A185,185,0,0,1,-147.633,-111.487L0,0Z" fill="hsl(80, 100%, 56.2745098039%)" class="pieCircle"/><path d="M-147.633,-111.487A185,185,0,0,1,-97.39,-157.29L0,0Z" fill="hsl(240, 100%, 86.2745098039%)" class="pieCircle"/><path d="M-97.39,-157.29A185,185,0,0,1,-66.83,-172.507L0,0Z" fill="hsl(60, 100%, 63.5294117647%)" class="pieCircle"/><path d="M-66.83,-172.507A185,185,0,0,1,0,-185L0,0Z" fill="hsl(80, 100%, 76.2745098039%)" class="pieCircle"/><text transform="translate(129.38052182985436,50.12228118346748)" class="slice" style="text-anchor: middle;">62%</text><text transform="translate(-124.20390667551492,61.84619686399464)" class="slice" style="text-anchor: middle;">12%</text><text transform="translate(-133.45330799022864,-37.9707398725015)" class="slice" style="text-anchor: middle;">12%</text><text transform="translate(-93.4752705559598,-102.53748726436646)" class="slice" style="text-anchor: middle;">6%</text><text transform="translate(-61.84619686399465,-124.20390667551492)" class="slice" style="text-anchor: middle;">3%</text><text transform="translate(-25.495245597049085,-136.3875175811414)" class="slice" style="text-anchor: middle;">6%</text><text x="0" y="-200" class="pieTitleText">Source modules by category</text><g class="legend" transform="translate(216,-66)"><rect width="18" height="18" style="fill: rgb(236, 236, 255); stroke: rgb(236, 236, 255);"/><text x="22" y="14">Classic AUTOSAR (re-used as-is)</text></g><g class="legend" transform="translate(216,-44)"><rect width="18" height="18" style="fill: rgb(255, 255, 222); stroke: rgb(255, 255, 222);"/><text x="22" y="14">AUTOSAR modified for PQC</text></g><g class="legend" transform="translate(216,-22)"><rect width="18" height="18" style="fill: rgb(181, 255, 32); stroke: rgb(181, 255, 32);"/><text x="22" y="14">New PQC modules</text></g><g class="legend" transform="translate(216,0)"><rect width="18" height="18" style="fill: rgb(185, 185, 255); stroke: rgb(185, 185, 255);"/><text x="22" y="14">New application / debug</text></g><g class="legend" transform="translate(216,22)"><rect width="18" height="18" style="fill: rgb(255, 255, 69); stroke: rgb(255, 255, 69);"/><text x="22" y="14">Hardware abstraction (Mcal)</text></g><g class="legend" transform="translate(216,44)"><rect width="18" height="18" style="fill: rgb(215, 255, 134); stroke: rgb(215, 255, 134);"/><text x="22" y="14">OS / scheduling</text></g></g></svg>