# Security-focused workflow (ISO/SAE 21434 + UN R155)
#
# Jobs:
#   - codeql          : CWE Top 25 static analysis (C/C++, Python)
#   - secret-scan     : Gitleaks — ISO 21434 §9.4
#   - sbom            : CycloneDX SBOM — UN R155 §7.3.7 / Annex 5
#   - sca             : Grype vuln scan over SBOM — ISO 21434 §15 supply chain

name: Security & Supply Chain

on:
  push:
    branches: ["main", "compliance_check"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * 1"  # weekly Mon 03:00 UTC (CWE / CVE drift)
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # CodeQL (C/C++ + Python) — UN R155 §7.3.3 / ISO 21434 §10.4.2
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        language: [cpp, python]
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps (cpp only)
        if: matrix.language == 'cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build libssl-dev

      - name: Cache liboqs
        if: matrix.language == 'cpp'
        uses: actions/cache@v4
        with:
          path: Autosar_SecOC/external/liboqs/build
          key: liboqs-${{ runner.os }}-gcc-${{ hashFiles('Autosar_SecOC/external/liboqs/CMakeLists.txt') }}

      - name: Build liboqs (cpp only, if cache miss)
        if: matrix.language == 'cpp'
        working-directory: Autosar_SecOC/external/liboqs
        run: |
          if [ ! -f build/lib/liboqs.a ]; then
            rm -rf build && mkdir -p build && cd build
            cmake -GNinja -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF \
              -DOQS_BUILD_ONLY_LIB=ON \
              -DOQS_ENABLE_KEM_ml_kem_768=ON \
              -DOQS_ENABLE_SIG_ml_dsa_65=ON ..
            cmake --build . --parallel
          fi

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Build C/C++ for CodeQL
        if: matrix.language == 'cpp'
        working-directory: Autosar_SecOC
        run: |
          cmake -B build -GNinja -DMCAL_TARGET=SIM
          cmake --build build --parallel

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ---------------------------------------------------------------------------
  # Gitleaks secret scanning — ISO 21434 §9.4
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  # ---------------------------------------------------------------------------
  # SBOM — UN R155 §7.3.7 / Annex 5, ISO 21434 §15
  # ---------------------------------------------------------------------------
  sbom:
    name: SBOM (CycloneDX via Syft)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          artifact-name: sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json

  # ---------------------------------------------------------------------------
  # Grype SCA scan (liboqs + system deps) — ISO 21434 §15
  # ---------------------------------------------------------------------------
  sca:
    name: SCA Vulnerability Scan (Grype)
    runs-on: ubuntu-22.04
    needs: sbom
    steps:
      - uses: actions/checkout@v4

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom

      - name: Scan SBOM with Grype
        uses: anchore/scan-action@v4
        id: grype
        with:
          sbom: sbom.cyclonedx.json
          fail-build: false        # informational first; set true after baselining
          severity-cutoff: high
          output-format: sarif

      - name: Upload Grype SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype
